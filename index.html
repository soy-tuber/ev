<title>EVデータベース</title>
<style>
  body{margin:0; padding:20px; background:#fff; color:#1a1a1a;

  h1{font-size:18px; margin:0 0 14px}
  .group{margin:0 0 12px}
  .group > .lbl{font-size:11px; color:#888; margin:0 0 6px; letter-spacing:.04em}
  .tags{display:flex; gap:7px; flex-wrap:wrap; align-items:center}
  .tag{cursor:pointer; user-select:none; border:1px solid #d2d2d2; background:#fff; color:#333;
    padding:5px 13px; border-radius:999px; font-size:13px; transition:.1s; white-space:nowrap}
  .tag:hover{border-color:#aaa}
  .tag.on{background:#1453e5; border-color:#1453e5; color:#fff}
  .tag.st.on{background:#127a3e; border-color:#127a3e}
  .reset{cursor:pointer; border:none; background:none; color:#1453e5; font:inherit; font-size:12px; padding:5px 4px; text-decoration:underline}
  .count{color:#666; font-size:12px; margin:14px 0 10px}
  .scroll{overflow:auto; max-height:calc(100vh - 230px); border:1px solid #ddd; border-radius:4px}
  table{border-collapse:collapse; width:100%; white-space:nowrap}
  th,td{padding:7px 10px; border-bottom:1px solid #eee; text-align:left}
  th{position:sticky; top:0; background:#f4f4f4; cursor:pointer; user-select:none; font-weight:600; border-bottom:1px solid #ccc}
  th:hover{background:#e9e9e9}
  th.sorted{color:#1453e5}
  th .ar{font-size:10px; color:#1453e5; margin-left:3px}
  td.num{text-align:right; font-variant-numeric:tabular-nums}
  tbody tr:nth-child(even){background:#fafafa}
  tbody tr:hover{background:#eef4ff}
  .empty{padding:40px; text-align:center; color:#888}
</style>
</head>

const COLS = ["モデルグループ", "年式", "ブランド", "モデル名", "販売状況", "バッテリー容量_kWh", "航続距離_WLTC_km", "電費_Wh_per_km", "0-100km/h_秒", "最大急速充電_kW", "価格_万円", "推定値あり", "備考"];
const NUM = new Set(["価格_万円", "バッテリー容量_kWh", "電費_Wh_per_km", "推定値あり", "年式", "0-100km/h_秒", "最大急速充電_kW", "航続距離_WLTC_km"]);
let sortKey=null, sortDir=1;

const sel = { status:new Set(), brands:new Set(), price:null };

// price buckets [label, min, max]
const PRICE=[['〜300',0,300],['300〜500',300,500],['500〜700',500,700],['700〜1000',700,1000],['1000〜',1000,1e9]];

// ---- build tags ----
const statuses=[...new Set(DATA.map(d=>d['販売状況']))];
const stWrap=document.getElementById('statusTags');
statuses.forEach(s=>{
  const t=document.createElement('div'); t.className='tag st'; t.textContent=s;
  t.onclick=()=>{ sel.status.has(s)?sel.status.delete(s):sel.status.add(s); t.classList.toggle('on'); render(); };
  stWrap.appendChild(t);
});

const brands=[...new Set(DATA.map(d=>d['ブランド']))].sort((a,b)=>a.localeCompare(b,'ja'));
const brWrap=document.getElementById('brandTags');
brands.forEach(b=>{
  const t=document.createElement('div'); t.className='tag'; t.textContent=b;
  t.onclick=()=>{ sel.brands.has(b)?sel.brands.delete(b):sel.brands.add(b); t.classList.toggle('on'); render(); };
  brWrap.appendChild(t);
});

const prWrap=document.getElementById('priceTags');
PRICE.forEach((p,i)=>{
  const t=document.createElement('div'); t.className='tag'; t.textContent=p[0]+'万';
  t.onclick=()=>{
    if(sel.price===i){ sel.price=null; t.classList.remove('on'); }
    else { sel.price=i; prWrap.querySelectorAll('.tag').forEach(x=>x.classList.remove('on')); t.classList.add('on'); }
    render();
  };
  prWrap.appendChild(t);
});
const rst=document.createElement('button'); rst.className='reset'; rst.textContent='すべて解除';
rst.onclick=()=>{
  sel.status.clear(); sel.brands.clear(); sel.price=null;
  document.querySelectorAll('.tag.on').forEach(x=>x.classList.remove('on'));
  sortKey=null; sortDir=1; render();
};
prWrap.appendChild(rst);

// ---- header ----
const head=document.getElementById('head');
COLS.forEach(c=>{
  const th=document.createElement('th');
  th.textContent=c.replace(/_/g,' ');
  const ar=document.createElement('span'); ar.className='ar'; th.appendChild(ar);
  th.onclick=()=>{ if(sortKey===c) sortDir*=-1; else {sortKey=c; sortDir=1;} render(); };
  th.dataset.key=c; head.appendChild(th);
});

function filtered(){
  return DATA.filter(d=>{
    if(sel.status.size && !sel.status.has(d['販売状況'])) return false;
    if(sel.brands.size && !sel.brands.has(d['ブランド'])) return false;
    if(sel.price!=null){
      const p=parseFloat(d['価格_万円']); const [,lo,hi]=PRICE[sel.price];
      if(isNaN(p) || p<lo || p>=hi) return false;
    }
    return true;
  });
}

function render(){
  let rows=filtered();
  if(sortKey){
    const isNum=NUM.has(sortKey);
    rows.sort((a,b)=>{
      let va=a[sortKey], vb=b[sortKey];
      if(isNum){
        const na=(va===''), nb=(vb==='');
        if(na&&nb) return 0; if(na) return 1; if(nb) return -1;
        return (parseFloat(va)-parseFloat(vb))*sortDir;
      }
      return String(va).localeCompare(String(vb),'ja')*sortDir;
    });
  }
  const body=document.getElementById('body'); body.innerHTML='';
  document.getElementById('empty').style.display=rows.length?'none':'block';
  document.getElementById('tbl').style.display=rows.length?'':'none';
  const frag=document.createDocumentFragment();
  rows.forEach(r=>{
    const tr=document.createElement('tr');
    COLS.forEach(c=>{
      const td=document.createElement('td'); td.textContent=r[c];
      if(NUM.has(c)) td.className='num';
      tr.appendChild(td);
    });
    frag.appendChild(tr);
  });
  body.appendChild(frag);
  document.querySelectorAll('#head th').forEach(th=>{
    const ar=th.querySelector('.ar');
    if(th.dataset.key===sortKey){ th.classList.add('sorted'); ar.textContent=sortDir>0?'▲':'▼'; }
    else { th.classList.remove('sorted'); ar.textContent=''; }
  });
  document.getElementById('count').textContent=rows.length+' 件';
}
render();
</script>
</body>
